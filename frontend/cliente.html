<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Área do Cliente</title>
    <link rel="stylesheet" href="cliente.css">
</head>
<body>

    <!-- Tela de Login/Registro -->
    <div id="tela-auth">
        <div class="auth-card">
            <h1>✂️ Barbearia</h1>
            <p>Área do Cliente</p>

            <!-- Abas -->
            <div class="abas">
                <button class="aba ativa" id="aba-login" onclick="mostrarAba('login')">
                    Entrar
                </button>
                <button class="aba" id="aba-registro" onclick="mostrarAba('registro')">
                    Criar Conta
                </button>
            </div>

            <!-- Formulário de Login -->
            <div id="form-login">
                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com">
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••••">
                </div>
                <button onclick="login()">Entrar</button>
            </div>

            <!-- Formulário de Registro -->
            <div id="form-registro" style="display:none">
                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="reg-nome" placeholder="Seu nome completo">
                </div>
                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="reg-telefone" placeholder="55999999999">
                </div>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com">
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="reg-senha" placeholder="••••••••">
                </div>
                <button onclick="registrar()">Criar Conta</button>
            </div>

            <p id="auth-erro"></p>
            <p id="auth-sucesso"></p>
        </div>
    </div>

    <!-- Área do Cliente -->
    <div id="area-cliente" style="display:none">

        <header>
            <h1>✂️ Barbearia</h1>
            <div>
                <span id="nome-cliente"></span>
                <button id="btn-logout" onclick="logout()">Sair</button>
            </div>
        </header>

        <main>
            <!-- Novo Agendamento -->
            <section class="card">
                <h2>📅 Novo Agendamento</h2>

                <div class="campo">
                    <label>Barbeiro</label>
                    <select id="barbeiro-select"></select>
                </div>

                <div class="campo">
                    <label>Data e Hora</label>
                    <input type="datetime-local" id="data-hora">
                </div>

                <button onclick="criarAgendamento()">Agendar</button>
                <p id="agendamento-feedback"></p>
            </section>

            <!-- Meus Agendamentos -->
            <section class="card">
                <h2>📋 Meus Agendamentos</h2>
                <div id="lista-meus-agendamentos"></div>
            </section>
        </main>
    </div>

    <script src="cliente.js"></script>
</body>
</html>

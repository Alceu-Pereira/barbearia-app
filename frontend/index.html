<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Agendamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    
    <!-- Tela de Login/Registro -->
    <div id="tela-auth">
        <div class="auth-card">
            <h1>✂️ Barbearia</h1>
            <p>Sistema de Agendamentos</p>

            <!-- Abas -->
            <div style="display:flex; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid #ddd;">
                <button id="aba-login" onclick="mostrarAba('login')"
                    style="flex:1; padding:10px; background:#1a1a2e; color:white; border:none; cursor:pointer; font-size:0.95rem; font-weight:600; margin-top:0; border-radius:0;">
                    Entrar
                </button>
                <button id="aba-registro" onclick="mostrarAba('registro')"
                    style="flex:1; padding:10px; background:white; color:#666; border:none; cursor:pointer; font-size:0.95rem; font-weight:600; margin-top:0; border-radius:0;">
                    Criar Conta
                </button>
            </div>

             <!-- Formulário de Login -->
              <div id="form-login">
                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com">
                </div>
                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="login-senha" placeholder="•••••••••">
                </div>
                <button onclick="login()">Entrar</button>
              </div>

              <!-- Formulário de Registro -->
              <div id="form-registro" style="display: none;">

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="reg-nome" placeholder="Seu nome completo">
                </div>

                <div class="campo">
                    <label>Telefone</label>
                    <input type="text" id="reg-telefone" placeholder="55999999999">
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="reg-senha" placeholder="•••••••••">
                </div>
                <button onclick="registrar()">Criar Conta</button>
              </div>

              <p id="auth-erro"></p>
              <p id="auth-sucesso"></p>
        </div>
    </div>

    <!-- Área de Agendamentos -->
    <div id="area-agendamentos" style="display:none">

        <header>
            <h1>✂️ Barbearia</h1>
            <div style="display:flex; align-items:center; gap:16px;">
                <span id="nome-cliente" style="color:#a0a0b0; font-size:0.95rem;"></span>
                <button id="btn-logout" onclick="logout()" style="width:auto; padding:6px 16px; background:transparent; border:1px solid white; font-size:0.9rem; margin-top:0;">Sair</button>
            </div>
        </header>

        <main>
            <!-- Formulário de Agendamento -->
            <section class="card" id="secao-formulario">
                <h2>Novo Agendamento</h2>

                <div class="campo">
                    <label>Barbeiro</label>
                    <select id="barbeiro_id"></select>
                </div>

                <div class="campo">
                    <label>Data e Hora</label>
                    <input type="datetime-local" id="data_hora">
                </div>

                <button onclick="criarAgendamento()">Agendar</button>
                <p id="mensagem-feedback"></p>
            </section>

            <!-- Lista de Agendamentos -->
            <section class="card" id="secao-lista">
                <h2>Meus Agendamentos</h2>
                <div id="lista-agendamentos">
                    <p>Carregando...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
